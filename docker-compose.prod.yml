# Production: pull application images from a registry (no build).
# Infrastructure (postgres, redis, elasticsearch) uses public images.
#
# Required env:
#   REGISTRY   - e.g. docker.io/yourusername or ghcr.io/myorg
# Optional:
#   IMAGE_TAG  - tag to pull (default: latest)
#
# Usage:
#   REGISTRY=ghcr.io/myorg docker compose -f docker-compose.prod.yml up -d
#   Or set in .env.production and: docker compose -f docker-compose.prod.yml --env-file .env.production up -d

services:
  # ==========================================
  # Infrastructure (unchanged – pull from Docker Hub)
  # ==========================================

  postgres-core:
    image: postgres:16-alpine
    container_name: mp-postgres-core
    environment:
      POSTGRES_DB: ${POSTGRES_CORE_DB:-medicinal_plants_core}
      POSTGRES_USER: ${POSTGRES_CORE_USER:-mp_core_user}
      POSTGRES_PASSWORD: ${POSTGRES_CORE_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_core_data:/var/lib/postgresql/data
      - ./database/postgres/schemas/core:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_CORE_USER:-mp_core_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mp-network

  postgres-auth:
    image: postgres:16-alpine
    container_name: mp-postgres-auth
    environment:
      POSTGRES_DB: ${POSTGRES_AUTH_DB:-medicinal_plants_auth}
      POSTGRES_USER: ${POSTGRES_AUTH_USER:-mp_auth_user}
      POSTGRES_PASSWORD: ${POSTGRES_AUTH_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
      - ./database/postgres/schemas/auth:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_AUTH_USER:-mp_auth_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mp-network

  postgres-chatbot:
    image: postgres:16-alpine
    container_name: mp-postgres-chatbot
    environment:
      POSTGRES_DB: ${POSTGRES_CHATBOT_DB:-medicinal_plants_chatbot}
      POSTGRES_USER: ${POSTGRES_CHATBOT_USER:-mp_chatbot_user}
      POSTGRES_PASSWORD: ${POSTGRES_CHATBOT_PASSWORD}
    ports:
      - "5436:5432"
    volumes:
      - postgres_chatbot_data:/var/lib/postgresql/data
      - ./database/postgres/schemas/chatbot:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_CHATBOT_USER:-mp_chatbot_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mp-network

  postgres-user:
    image: postgres:16-alpine
    container_name: mp-postgres-user
    environment:
      POSTGRES_DB: ${POSTGRES_USER_DB:-medicinal_plants_user}
      POSTGRES_USER: ${POSTGRES_USER_USER:-mp_user_user}
      POSTGRES_PASSWORD: ${POSTGRES_USER_PASSWORD}
    ports:
      - "5435:5432"
    volumes:
      - postgres_user_data:/var/lib/postgresql/data
      - ./database/postgres/schemas/user:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER_USER:-mp_user_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mp-network

  redis:
    image: redis:7-alpine
    container_name: mp-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mp-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: mp-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - mp-network

  # ==========================================
  # Application services (pull from registry)
  # ==========================================

  api-gateway:
    image: ${REGISTRY}/quimicadealtura_api-api-gateway:${IMAGE_TAG:-latest}
    container_name: mp-api-gateway
    ports:
      - "${API_GATEWAY_PORT:-8000}:8000"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - AUTH_SERVICE_URL=http://auth-service:8001
      - PLANT_SERVICE_URL=http://plant-service:8002
      - CHATBOT_SERVICE_URL=http://chatbot-service:8003
      - SEARCH_SERVICE_URL=http://search-service:8004
      - USER_SERVICE_URL=http://user-service:8005
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-60}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - mp-network

  auth-service:
    image: ${REGISTRY}/quimicadealtura_api-auth-service:${IMAGE_TAG:-latest}
    container_name: mp-auth-service
    ports:
      - "${AUTH_SERVICE_PORT:-8001}:8001"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_AUTH_USER}:${POSTGRES_AUTH_PASSWORD}@postgres-auth:5432/${POSTGRES_AUTH_DB:-medicinal_plants_auth}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS=${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-true}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME}
      - EMAIL_VERIFICATION_CODE_EXPIRY_MINUTES=${EMAIL_VERIFICATION_CODE_EXPIRY_MINUTES:-15}
      - PASSWORD_RESET_CODE_EXPIRY_MINUTES=${PASSWORD_RESET_CODE_EXPIRY_MINUTES:-15}
      - MAX_LOGIN_ATTEMPTS=${MAX_LOGIN_ATTEMPTS:-5}
      - LOCKOUT_DURATION_MINUTES=${LOCKOUT_DURATION_MINUTES:-30}
      - RATE_LIMIT_LOGIN_PER_15MIN=${RATE_LIMIT_LOGIN_PER_15MIN:-5}
      - TWO_FACTOR_ISSUER_NAME=${TWO_FACTOR_ISSUER_NAME:-Medicinal Plants API}
    depends_on:
      postgres-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mp-network

  plant-service:
    image: ${REGISTRY}/quimicadealtura_api-plant-service:${IMAGE_TAG:-latest}
    container_name: mp-plant-service
    ports:
      - "${PLANT_SERVICE_PORT:-8002}:8002"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_CORE_USER}:${POSTGRES_CORE_PASSWORD}@postgres-core:5432/${POSTGRES_CORE_DB:-medicinal_plants_core}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=1
      - PUBMED_API_KEY=${PUBMED_API_KEY}
      - PUBMED_BASE_URL=${PUBMED_BASE_URL}
      - PUBCHEM_BASE_URL=${PUBCHEM_BASE_URL}
      - PMC_IDCONV_BASE_URL=${PMC_IDCONV_BASE_URL}
      - PMC_OA_BASE_URL=${PMC_OA_BASE_URL}
      - PMC_CITATION_BASE_URL=${PMC_CITATION_BASE_URL}
      - PMC_BIOC_BASE_URL=${PMC_BIOC_BASE_URL}
      - NCBI_TOOL_NAME=${NCBI_TOOL_NAME:-QuimicaDeAltura}
      - NCBI_TOOL_EMAIL=${NCBI_TOOL_EMAIL}
    depends_on:
      postgres-core:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mp-network

  chatbot-service:
    image: ${REGISTRY}/quimicadealtura_api-chatbot-service:${IMAGE_TAG:-latest}
    container_name: mp-chatbot-service
    ports:
      - "${CHATBOT_SERVICE_PORT:-8003}:8003"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_CHATBOT_USER}:${POSTGRES_CHATBOT_PASSWORD}@postgres-chatbot:5432/${POSTGRES_CHATBOT_DB:-medicinal_plants_chatbot}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=2
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL}
      - PLANT_SERVICE_URL=http://plant-service:8002
    depends_on:
      postgres-chatbot:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mp-network

  search-service:
    image: ${REGISTRY}/quimicadealtura_api-search-service:${IMAGE_TAG:-latest}
    container_name: mp-search-service
    ports:
      - "${SEARCH_SERVICE_PORT:-8004}:8004"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - ELASTICSEARCH_HOST=elasticsearch
      - ELASTICSEARCH_PORT=9200
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=4
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mp-network

  user-service:
    image: ${REGISTRY}/quimicadealtura_api-user-service:${IMAGE_TAG:-latest}
    container_name: mp-user-service
    ports:
      - "${USER_SERVICE_PORT:-8005}:8005"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER_USER}:${POSTGRES_USER_PASSWORD}@postgres-user:5432/${POSTGRES_USER_DB:-medicinal_plants_user}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=3
    depends_on:
      postgres-user:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mp-network

  webpage:
    image: ${REGISTRY}/quimicadealtura_api-webpage:${IMAGE_TAG:-latest}
    container_name: mp-webpage
    ports:
      - "${WEBPAGE_PORT:-3000}:80"
    environment:
      - API_BASE_URL=${API_BASE_URL}
    networks:
      - mp-network

  landingpage:
    image: ${REGISTRY}/quimicadealtura_api-landingpage:${IMAGE_TAG:-latest}
    container_name: mp-landingpage
    ports:
      - "${LANDINGPAGE_PORT:-3001}:80"
    environment:
      - API_BASE_URL=${API_BASE_URL}
    networks:
      - mp-network

volumes:
  postgres_core_data:
  postgres_auth_data:
  postgres_chatbot_data:
  postgres_user_data:
  redis_data:
  elasticsearch_data:

networks:
  mp-network:
    driver: bridge
