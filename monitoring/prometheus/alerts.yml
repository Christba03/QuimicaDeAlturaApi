groups:
  - name: service_health
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.job }} has been down for more than 1 minute."

      - alert: HighErrorRate
        expr: |
          sum(rate(http_requests_total{status=~"5.."}[5m])) by (service)
          /
          sum(rate(http_requests_total[5m])) by (service)
          > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.service }}"
          description: "Error rate is above 5% for {{ $labels.service }}."

      - alert: HighLatency
        expr: |
          histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service))
          > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency on {{ $labels.service }}"
          description: "95th percentile latency is above 2s for {{ $labels.service }}."

  - name: infrastructure
    rules:
      - alert: PostgresDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL exporter reports the database is unreachable."

      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis exporter reports Redis is unreachable."

      - alert: HighPostgresConnections
        expr: |
          sum(pg_stat_activity_count) by (datname)
          > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High connection count on {{ $labels.datname }}"
          description: "PostgreSQL has more than 80 active connections."

      - alert: RedisHighMemory
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage above 85%"
          description: "Redis is using more than 85% of max configured memory."

  - name: chatbot
    rules:
      - alert: ChatbotHighResponseTime
        expr: |
          histogram_quantile(0.95, sum(rate(chatbot_response_duration_seconds_bucket[5m])) by (le))
          > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Chatbot response time is high"
          description: "95th percentile chatbot response time exceeds 10 seconds."

      - alert: HighChatbotErrorRate
        expr: |
          sum(rate(chatbot_requests_total{status="error"}[5m]))
          /
          sum(rate(chatbot_requests_total[5m]))
          > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High chatbot error rate"
          description: "More than 10% of chatbot requests are failing."
