global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "service"]
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: "default"
  routes:
    - match:
        severity: critical
      receiver: "critical"
      group_wait: 5s
    - match:
        severity: warning
      receiver: "default"

receivers:
  - name: "default"
    # Configure your notification channels here
    # Example webhook:
    # webhook_configs:
    #   - url: "http://your-webhook-url/alerts"

  - name: "critical"
    # Configure critical alert notifications
    # Example email:
    # email_configs:
    #   - to: "admin@example.com"
    #     from: "alertmanager@medicinal-plants.mx"
    #     smarthost: "smtp.example.com:587"

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname", "service"]
