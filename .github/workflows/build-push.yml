# Build and push Docker images to Docker Hub on push to main.
# Requires repository secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
#
# Optional: run only when CI passes by uncommenting workflow_run below.

name: Build and Push Images

on:
  push:
    branches: [main, master]
  # Uncomment to push only after CI succeeds:
  # workflow_run:
  #   workflows: ["CI/CD Pipeline"]
  #   types: [completed]
  #   branches: [main, master]

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1
  # In-repo services only (webpage/landingpage use sibling dirs, build locally)
  SERVICES: api-gateway auth-service plant-service chatbot-service search-service user-service

jobs:
  build-and-push:
    name: Build and push to Docker Hub
    runs-on: ubuntu-latest
    # Uncomment if using workflow_run so we only run when CI succeeded:
    # if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build images
        run: |
          docker compose -f docker-compose.yml -f docker-compose.build.yml build ${{ env.SERVICES }}

      - name: Tag and push (latest)
        env:
          REGISTRY: docker.io/${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          for img in api-gateway auth-service plant-service chatbot-service search-service user-service; do
            name="quimicadealtura_api-${img}"
            docker tag "${name}:prod" "${REGISTRY}/${name}:latest"
            docker push "${REGISTRY}/${name}:latest"
          done

      - name: Tag and push (git SHA)
        env:
          REGISTRY: docker.io/${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          for img in api-gateway auth-service plant-service chatbot-service search-service user-service; do
            name="quimicadealtura_api-${img}"
            docker tag "${name}:prod" "${REGISTRY}/${name}:${SHORT_SHA}"
            docker push "${REGISTRY}/${name}:${SHORT_SHA}"
          done
